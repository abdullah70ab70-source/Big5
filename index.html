<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف كبار القراء - أداء ذكي</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JJ4WGLT89"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6JJ4WGLT89');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #f8faf9; --bg-mid: #ffffff; --bg-light: #f0f4f2;
            --accent-gold: #c5a059; --accent-hover: #b38f4d;
            --text-main: #2c3e50; --text-muted: #7f8c8d;
            --glass-bg: rgba(0, 0, 0, 0.02); --glass-border: rgba(0, 0, 0, 0.05);
            --glass-active: rgba(197, 160, 89, 0.08);
            --player-bg: rgba(255, 255, 255, 0.95);
            --shadow-intensity: rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --bg-dark: #121212; --bg-mid: #1c1c1c; --bg-light: #252525;
            --text-main: #ffffff; --text-muted: #9a9a9a;
            --glass-bg: rgba(255, 255, 255, 0.02); --glass-border: rgba(255, 255, 255, 0.08);
            --glass-active: rgba(197, 160, 89, 0.12);
            --player-bg: rgba(26, 26, 26, 0.98);
            --shadow-intensity: rgba(0, 0, 0, 0.5);
        }

        /* --- الأداء الفائق (GPU) --- */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spin { animation: spin 1s linear infinite; will-change: transform; }
        @keyframes pulse-ring-opt { 0% { transform: scale(0.7); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }
        @keyframes equalize-opt { 0% { transform: scaleY(0.3); } 100% { transform: scaleY(1); } }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding-bottom: 140px; transition: background-color 0.15s ease; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 8px 16px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .top-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        header { text-align: center; margin-bottom: 20px; }
        .header-img { height: 85px; width: 85px; border-radius: 50%; border: 2px solid var(--accent-gold); object-fit: cover; box-shadow: 0 4px 20px var(--shadow-intensity); }
        header h1 { font-size: 1.25rem; font-weight: 300; margin-top: 10px; }
        header h1 strong { font-weight: 700; color: var(--accent-gold); }

        /* القراء */
        .sheikh-list { display: flex; gap: 10px; overflow-x: auto; padding: 10px 4px; scrollbar-width: none; }
        .sheikh-list::-webkit-scrollbar { display: none; }
        .sheikh-item {
            background: var(--bg-mid); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 8px; min-width: 90px; text-align: center; cursor: pointer; transition: 0.2s;
            box-shadow: 0 3px 8px var(--shadow-intensity);
        }
        .sheikh-item.active { border-color: var(--accent-gold); background: var(--glass-active); transform: translateY(-2px); }
        .sheikh-avatar-container { position: relative; width: 50px; height: 50px; margin: 0 auto; }
        .sheikh-avatar-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

        .playing-badge {
            position: absolute; bottom: -3px; right: -3px; width: 22px; height: 22px;
            background: var(--accent-gold); border-radius: 50%; border: 2px solid var(--bg-mid);
            display: flex; align-items: flex-end; justify-content: center; gap: 2px; padding-bottom: 4px; z-index: 2;
        }
        .playing-badge::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent-gold); border-radius: 50%; z-index: -1;
            animation: pulse-ring-opt 1.5s cubic-bezier(0.24, 0, 0.38, 1) infinite;
        }
        .equalizer-bar { width: 2px; background: #fff; height: 10px; transform-origin: bottom; }
        .bar1 { animation: equalize-opt 0.8s infinite alternate; }
        .bar2 { animation: equalize-opt 0.5s infinite alternate; animation-delay: 0.1s; }
        .bar3 { animation: equalize-opt 0.7s infinite alternate; animation-delay: 0.2s; }

        /* السور */
        .surah-list-container { display: flex; flex-direction: column; gap: 6px; }
        .surah-row {
            display: flex; align-items: center; justify-content: space-between; padding: 12px;
            background: var(--bg-mid); border: 1px solid var(--glass-border); border-radius: 12px; transition: 0.2s;
        }
        .surah-row.active-row { border-color: var(--accent-gold); background: var(--glass-active); }
        .icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .playing-icon { color: var(--accent-gold) !important; }

        /* اللاعب */
        .floating-player {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 440px; background: var(--player-bg); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; z-index: 1000;
        }
        .player-seekbar-container { width: 100%; height: 5px; background: rgba(0,0,0,0.05); border-radius: 10px; margin-bottom: 10px; direction: ltr; cursor: pointer; }
        .player-seekbar-fill { height: 100%; background: var(--accent-gold); width: 0%; border-radius: 10px; will-change: width; }
        .play-toggle-btn { background: var(--accent-gold); color: #fff; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="light-theme">

    <div class="container">
        <div class="top-bar">
            <button class="top-btn" onclick="toggleTheme()">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px; height:20px;"></svg>
            </button>
            <div style="font-weight: 700; color: var(--accent-gold);">مصحف كبار القراء</div>
            <button class="top-btn" onclick="toggleLanguage()">EN</button>
        </div>

        <header>
            <img src="" id="header-avatar-img" class="header-img">
            <h1 id="main-title"></h1>
        </header>

        <div class="sheikh-list" id="sheikh-carousel"></div>
        <div id="pills-container" style="display:flex; gap:8px; overflow-x:auto; padding:10px 0;"></div>
        <div class="surah-list-container" id="main-surah-list"></div>
    </div>

    <div class="floating-player" id="global-player">
        <div class="player-seekbar-container" id="progress-container">
            <div class="player-seekbar-fill" id="progress-bar-fill"></div>
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between;">
            <div style="flex:1; min-width:0;">
                <div id="player-track-title" style="font-size:0.85rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                <div style="font-size:0.7rem; color:var(--text-muted);"><span id="curr-time">00:00</span> / <span id="total-time">00:00</span></div>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="icon-btn" onclick="playPrevious()"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon></svg></button>
                <button class="play-toggle-btn" id="player-play-btn" onclick="togglePlayPause()"></button>
                <button class="icon-btn" onclick="playNext()"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon></svg></button>
            </div>
        </div>
    </div>

    <script>
        const recitersList = [
            { id: "husary", nameAr: "محمود خليل الحصري", image: "https://h.top4top.io/p_3812jamsy0.jpg" },
            { id: "minshawi", nameAr: "محمد صديق المنشاوي", image: "https://f.top4top.io/p_38068cvpd0.jpg" },
            { id: "mustafa", nameAr: "مصطفى إسماعيل", image: "https://i.top4top.io/p_3812x41cu1.jpg" },
            { id: "banna", nameAr: "محمود علي البنا", image: "https://k.top4top.io/p_3812hi6wr3.jpeg" },
            { id: "basit", nameAr: "عبد الباسط عبد الصمد", image: "https://j.top4top.io/p_38125kmkj2.jpeg" }
        ];

        const editionsConfig = {
            "husary": { 1: { pillAr: "حفص (الإذاعة)", file: "husary_1.json" }, 2: { pillAr: "ورش", file: "husary_2.json" }, 3: { pillAr: "قالون", file: "husary_3.json" }, 4: { pillAr: "الدوري", file: "husary_4.json" }, 5: { pillAr: "المجود", file: "husary_5.json" } },
            "minshawi": { 1: { pillAr: "حفص (الإذاعة)", file: "minshawi_1.json" }, 2: { pillAr: "المجود", file: "minshawi_2.json" } },
            "mustafa": { 1: { pillAr: "حفص (الإذاعة)", file: "mustafa_1.json" } },
            "banna": { 1: { pillAr: "حفص (الإذاعة)", file: "banna_1.json" } },
            "basit": { 1: { pillAr: "حفص (الإذاعة)", file: "basit_1.json" } }
        };

        let currentTheme = 'light', currentSheikhId = "husary", currentEdition = 1;
        let activeSurahsData = [], playingSurahId = null, playingSheikhId = null, isBuffering = false;
        let audioInstance = new Audio();

        const icons = {
            play: '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
            pause: '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>',
            loading: '<svg class="loading-spin" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"></path></svg>',
            sun: '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>',
            moon: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'
        };

        // --- دالة التحديث الذكي (بدون إعادة رسم الـ DOM) ---
        function syncUIWithAudioState() {
            const isPlaying = !audioInstance.paused;
            const statusIcon = isBuffering ? icons.loading : (isPlaying ? icons.pause : icons.play);

            // 1. تحديث زر المشغل العائم
            document.getElementById('player-play-btn').innerHTML = statusIcon;

            // 2. تحديث قائمة السور (تغيير الأيقونات والـ Active Class فقط)
            document.querySelectorAll('.surah-row').forEach(row => {
                const rowId = parseInt(row.getAttribute('data-id'));
                const btn = row.querySelector('.icon-btn');
                
                if (rowId === playingSurahId && currentSheikhId === playingSheikhId) {
                    row.classList.add('active-row');
                    btn.classList.add('playing-icon');
                    btn.innerHTML = statusIcon;
                } else {
                    row.classList.remove('active-row');
                    btn.classList.remove('playing-icon');
                    btn.innerHTML = icons.play;
                }
            });

            // 3. تحديث قائمة القراء (إضافة مؤشر الصوت فقط)
            document.querySelectorAll('.sheikh-item').forEach(item => {
                const sId = item.getAttribute('data-id');
                let badge = item.querySelector('.playing-badge');
                
                if (sId === playingSheikhId && isPlaying) {
                    if (!badge) {
                        const badgeHTML = `<div class="playing-badge"><div class="equalizer-bar bar1"></div><div class="equalizer-bar bar2"></div><div class="equalizer-bar bar3"></div></div>`;
                        item.querySelector('.sheikh-avatar-container').insertAdjacentHTML('beforeend', badgeHTML);
                    }
                } else if (badge) {
                    badge.remove();
                }
            });
        }

        async function loadEditionData(sheikhId, editionNum) {
            const file = editionsConfig[sheikhId][editionNum].file;
            const cacheKey = `cache_${file}`;
            const cached = localStorage.getItem(cacheKey);
            if (cached) { activeSurahsData = JSON.parse(cached); renderSurahsList(); }
            try {
                const res = await fetch(file);
                const data = await res.json();
                activeSurahsData = data;
                localStorage.setItem(cacheKey, JSON.stringify(data));
                renderSurahsList();
            } catch (e) { console.error("Fetch failed"); }
        }

        function renderSheikhCarousel() {
            document.getElementById('sheikh-carousel').innerHTML = recitersList.map(s => `
                <div class="sheikh-item ${s.id === currentSheikhId ? 'active' : ''}" data-id="${s.id}" onclick="selectSheikh('${s.id}')">
                    <div class="sheikh-avatar-container">
                        <img src="${s.image}" class="sheikh-avatar-img">
                    </div>
                    <div style="font-size:0.65rem; font-weight:700; margin-top:5px;">${s.nameAr}</div>
                </div>`).join('');
            syncUIWithAudioState();
        }

        function renderSurahsList() {
            document.getElementById('main-surah-list').innerHTML = activeSurahsData.map(s => `
                <div class="surah-row" data-id="${s.id}">
                    <span class="surah-name">${s.id}. ${s.name}</span>
                    <button class="icon-btn" onclick="playSurah(${s.id}, '${s.url}', '${s.name}')">${icons.play}</button>
                </div>`).join('');
            syncUIWithAudioState();
        }

        async function selectSheikh(id) {
            currentSheikhId = id; currentEdition = 1;
            renderSheikhCarousel();
            renderEditionSelector();
            const s = recitersList.find(r => r.id === id);
            document.getElementById('header-avatar-img').src = s.image;
            document.getElementById('main-title').innerHTML = `الشيخ <strong>${s.nameAr}</strong>`;
            await loadEditionData(id, 1);
        }

        function renderEditionSelector() {
            const configs = editionsConfig[currentSheikhId];
            document.getElementById('pills-container').innerHTML = Object.keys(configs).map(key => `
                <div class="pill-item ${currentEdition == key ? 'active' : ''}" style="background: ${currentEdition == key ? 'var(--accent-gold)' : 'var(--bg-mid)'}; color: ${currentEdition == key ? '#fff' : 'var(--text-muted)'}; padding: 6px 14px; border-radius: 20px; font-size: 0.72rem; cursor: pointer; white-space: nowrap; border: 1px solid var(--glass-border);" onclick="switchEdition(${key})">
                    ${configs[key].pillAr}
                </div>`).join('');
        }

        async function switchEdition(num) {
            currentEdition = num; renderEditionSelector();
            await loadEditionData(currentSheikhId, num);
        }

        function playSurah(id, url, name) {
            if (playingSurahId === id && playingSheikhId === currentSheikhId) { togglePlayPause(); return; }
            playingSurahId = id; playingSheikhId = currentSheikhId;
            audioInstance.src = url; audioInstance.play();
            document.getElementById('global-player').style.display = 'block';
            document.getElementById('player-track-title').innerText = name;
            syncUIWithAudioState();
        }

        function togglePlayPause() {
            if (audioInstance.paused) audioInstance.play();
            else audioInstance.pause();
            syncUIWithAudioState();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.className = currentTheme === 'dark' ? 'dark-theme' : 'light-theme';
            document.getElementById('theme-icon').innerHTML = currentTheme === 'dark' ? icons.moon : icons.sun;
        }

        // مراقبة الحالة
        audioInstance.addEventListener('waiting', () => { isBuffering = true; syncUIWithAudioState(); });
        audioInstance.addEventListener('playing', () => { isBuffering = false; syncUIWithAudioState(); });
        audioInstance.addEventListener('canplay', () => { isBuffering = false; syncUIWithAudioState(); });
        audioInstance.addEventListener('play', () => syncUIWithAudioState());
        audioInstance.addEventListener('pause', () => syncUIWithAudioState());
        audioInstance.onended = () => playNext();

        function playNext() {
            const idx = activeSurahsData.findIndex(s => s.id === playingSurahId);
            if (idx < activeSurahsData.length - 1) {
                const next = activeSurahsData[idx + 1];
                playSurah(next.id, next.url, next.name);
            }
        }

        function playPrevious() {
            const idx = activeSurahsData.findIndex(s => s.id === playingSurahId);
            if (idx > 0) {
                const prev = activeSurahsData[idx - 1];
                playSurah(prev.id, prev.url, prev.name);
            }
        }

        audioInstance.ontimeupdate = () => {
            if (audioInstance.duration) {
                const pct = (audioInstance.currentTime / audioInstance.duration) * 100;
                document.getElementById('progress-bar-fill').style.width = pct + '%';
                document.getElementById('curr-time').innerText = formatTime(audioInstance.currentTime);
                document.getElementById('total-time').innerText = formatTime(audioInstance.duration);
            }
        };

        function formatTime(s) {
            const m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' + sec : sec}`;
        }

        (async () => {
            document.getElementById('theme-icon').innerHTML = icons.sun;
            await selectSheikh('husary');
        })();
    </script>
</body>
</html>
