<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف كبار القراء - المكتبة الصوتية</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JJ4WGLT89"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6JJ4WGLT89');

    <!-- استدعاء خط القاهرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme (Default) - "رقيق" and Soft */
            --bg-dark: #f8faf9;
            --bg-mid: #ffffff;
            --bg-light: #f0f4f2;
            --accent-gold: #c5a059;
            --accent-hover: #b38f4d;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-active: rgba(197, 160, 89, 0.08);
            --player-bg: rgba(255, 255, 255, 0.95);
            --switcher-btn-active: #ffffff;
            --shadow-intensity: rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --bg-dark: #121212;
            --bg-mid: #1c1c1c;
            --bg-light: #252525;
            --accent-gold: #c5a059;
            --accent-hover: #b38f4d;
            --text-main: #ffffff;
            --text-muted: #9a9a9a;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-active: rgba(197, 160, 89, 0.12);
            --player-bg: rgba(26, 26, 26, 0.98);
            --switcher-btn-active: radial-gradient(circle at top right, var(--bg-light), var(--bg-mid));
            --shadow-intensity: rgba(0, 0, 0, 0.5);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 140px; 
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            padding: 8px 16px 20px 16px; 
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 2px;
        }

        .top-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            width: 36px; 
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
        }

        .top-btn:hover {
            color: var(--accent-gold);
            background: var(--glass-active);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .top-btn svg { width: 18px; height: 18px; } 
        .top-btn span { font-size: 0.75rem; font-weight: 700; }

        header { text-align: center; padding: 4px 10px; }
        
        .header-image-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px; 
            position: relative;
            height: 85px;
        }

        .header-img {
            height: 85px; 
            width: 85px;
            object-fit: cover; 
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 4px 20px var(--shadow-intensity);
        }

        .header-fallback {
            height: 85px; 
            width: 85px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 4px 20px var(--shadow-intensity);
            background: radial-gradient(circle at top right, var(--bg-light), var(--bg-mid));
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 auto;
        }
        
        header h1 { 
            font-size: 1.25rem; 
            font-weight: 300;
            color: var(--text-main);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        header h1 strong { font-weight: 700; color: var(--accent-gold); }
        header p { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }

        /* Sheikh Horizontal Selector Card list */
        .sheikh-selector-wrapper {
            width: 100%;
            margin-bottom: 4px;
        }

        .sheikh-selector-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
            padding-right: 4px;
        }

        .sheikh-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px 4px 12px 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .sheikh-list::-webkit-scrollbar {
            display: none;
        }

        .sheikh-item {
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 8px;
            min-width: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 3px 8px var(--shadow-intensity);
            text-align: center;
        }

        .sheikh-item.active {
            border-color: var(--accent-gold);
            box-shadow: 0 6px 15px rgba(197, 160, 89, 0.25);
            background: var(--glass-active);
            transform: translateY(-2px);
        }

        .sheikh-avatar-container {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .sheikh-avatar-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            transition: border-color 0.2s ease;
        }

        .sheikh-item.active .sheikh-avatar-img {
            border-color: var(--accent-gold);
        }

        .sheikh-fallback-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at top right, var(--bg-light), var(--bg-mid));
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 2px 6px rgba(197, 160, 89, 0.15);
        }

        .sheikh-name-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            width: 76px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Pulsing Playing Badge on Sheikh Avatar - Animated Equalizer */
        .playing-badge {
            position: absolute;
            bottom: -3px;
            right: -3px;
            width: 24px;
            height: 24px;
            background: var(--accent-gold);
            border-radius: 50%;
            border: 2px solid var(--bg-mid);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            padding-bottom: 5px;
            box-shadow: 0 3px 8px rgba(197, 160, 89, 0.4);
            animation: pulse-ring 1.5s infinite;
            z-index: 10;
        }
        body.dark-theme .playing-badge {
            border-color: var(--bg-mid);
        }
        
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.6); }
            70% { box-shadow: 0 0 0 6px rgba(197, 160, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
        }
        
        .equalizer-bar {
            width: 3px;
            background-color: #ffffff;
            border-radius: 1px;
            height: 4px;
        }
        
        .equalizer-bar.bar1 {
            animation: equalize 0.8s ease-in-out infinite alternate;
        }
        .equalizer-bar.bar2 {
            animation: equalize 0.5s ease-in-out infinite alternate;
            animation-delay: 0.15s;
        }
        .equalizer-bar.bar3 {
            animation: equalize 0.7s ease-in-out infinite alternate;
            animation-delay: 0.3s;
        }
        
        @keyframes equalize {
            0% { height: 4px; }
            100% { height: 12px; }
        }

        /* Sleek Segmented Control Pills */
        .pills-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 4px 10px 4px;
            width: 100%;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .pills-container::-webkit-scrollbar {
            display: none;
        }

        .pill-item {
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 2px 6px var(--shadow-intensity);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pill-item.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(197, 160, 89, 0.25);
        }

        /* Pulsing indicator on the active edition pill */
        .pill-playing-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
            display: inline-block;
            animation: pulse-ring 1s infinite;
        }
        .pill-item.active .pill-playing-dot {
            background: #ffffff;
        }

        /* Surah Row Styling */
        .surah-list-container { display: flex; flex-direction: column; gap: 4px; }

        .surah-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px; 
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
            box-shadow: 0 1px 3px var(--shadow-intensity);
        }

        .surah-row:hover {
            background: var(--glass-bg);
            border-color: rgba(212, 175, 55, 0.2);
            transform: scale(1.01);
        }

        .surah-row.active-row {
            border-color: var(--accent-gold);
            background: var(--glass-active);
        }

        .surah-info { display: flex; align-items: center; gap: 10px; cursor: default; }
        .surah-number { font-size: 0.7rem; color: var(--accent-gold); font-weight: 700; width: 25px; }
        .surah-name { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }

        .actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s ease, background-color 0.15s ease;
        }

        .icon-btn:hover { color: var(--accent-gold); background: var(--bg-light); }
        .icon-btn svg { width: 18px; height: 18px; }
        .icon-btn.playing-icon { color: var(--accent-gold); }

        /* Floating Player */
        .floating-player {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 440px;
            background: var(--player-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
        }
        body.dark-theme .floating-player { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border-color: rgba(212, 175, 55, 0.3); }

        .floating-player.active { display: block; animation: slideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        @keyframes slideUp { from { bottom: -100px; opacity: 0; } to { bottom: 15px; opacity: 1; } }

        /* Seekbar with Thumb */
        .player-seekbar-container {
            width: 100%;
            height: 5px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            direction: ltr !important;
        }
        body.dark-theme .player-seekbar-container { background: rgba(255, 255, 255, 0.1); }

        .player-seekbar-fill { 
            height: 100%; 
            background: var(--accent-gold); 
            width: 0%; 
            border-radius: 10px; 
            position: relative;
        }

        .player-seekbar-thumb {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .player-seekbar-container:hover .player-seekbar-thumb { transform: translateY(-50%) scale(1.2); }

        .player-compact-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .player-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .player-title { font-size: 0.85rem; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-time { font-size: 0.65rem; color: var(--text-muted); font-variant-numeric: tabular-nums; margin-top: 1px; }
        
        .player-actions { display: flex; align-items: center; gap: 6px; }
        .player-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-main); 
            cursor: pointer; 
            padding: 6px; 
            border-radius: 50%; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s ease, background-color 0.15s ease, opacity 0.15s ease;
        }
        .player-btn svg { width: 18px; height: 18px; }
        
        /* Circular Play Button */
        .play-toggle-btn { 
            background: var(--accent-gold); 
            color: #fff !important; 
            width: 38px; 
            height: 38px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 50% !important;
            box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3);
        }
        .play-toggle-btn svg { width: 16px; height: 16px; }

        /* Option buttons style (Repeat & Autoplay) */
        .player-btn.opt-btn {
            color: var(--text-muted);
            opacity: 0.5;
        }
        .player-btn.opt-btn.active {
            color: var(--accent-gold);
            opacity: 1;
        }
        .player-btn.opt-btn svg { width: 15px; height: 15px; }

        /* Download Progress Overlay */
        .download-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        body.dark-theme .download-overlay { background: rgba(0, 0, 0, 0.85); }
        .download-overlay.active { opacity: 1; pointer-events: auto; }

        .download-card {
            background: var(--bg-mid); border: 1px solid var(--accent-gold);
            padding: 25px; border-radius: 20px; width: 85%; max-width: 320px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .download-title { font-size: 1rem; color: var(--text-main); }
        .download-surah-name { color: var(--accent-gold); font-weight: 700; margin-top: 5px; min-height: 20px; display: block; }
        .download-progress-container { height: 8px; background: var(--bg-light); border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .download-progress-fill { height: 100%; background: var(--accent-gold); width: 0%; transition: width 0.15s ease; }
        .download-percent { font-size: 0.8rem; color: var(--accent-gold); font-weight: 700; }

        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--bg-mid); border: 1px solid var(--accent-gold);
            color: var(--text-main); padding: 8px 18px; border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 4000; font-size: 0.8rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast-notification.active { transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="top-btn" onclick="toggleTheme()" id="theme-toggle-btn">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
            <button class="top-btn" onclick="toggleLanguage()">
                <span id="lang-label">EN</span>
            </button>
        </div>

        <header>
            <div class="header-image-container">
                <img src="" alt="" class="header-img" id="header-avatar-img" style="display:none;">
                <div class="header-fallback" id="header-avatar-fallback"></div>
            </div>
            <h1 id="main-title"></h1>
            <p id="header-subtitle"></p>
        </header>

        <!-- Sheikh Horizonal Carousel Selector -->
        <div class="sheikh-selector-wrapper">
            <div class="sheikh-selector-title" id="sheikh-select-title">اختر القارئ:</div>
            <div class="sheikh-list" id="sheikh-carousel"></div>
        </div>

        <!-- Sleek Segmented Control Pills -->
        <div class="pills-container" id="pills-container"></div>

        <div class="surah-list-container" id="main-surah-list"></div>
    </div>

    <!-- Floating Player -->
    <div class="floating-player" id="global-player">
        <div class="player-seekbar-container" id="progress-container">
            <div class="player-seekbar-fill" id="progress-bar-fill">
                <div class="player-seekbar-thumb" id="progress-thumb"></div>
            </div>
        </div>
        <div class="player-compact-row">
            <div class="player-info">
                <div class="player-title" id="player-track-title">اختر سورة للبدء...</div>
                <div class="player-time"><span id="curr-time">00:00</span> / <span id="total-time">00:00</span></div>
            </div>
            <div class="player-actions">
                <!-- خيار تكرار السورة -->
                <button class="player-btn opt-btn" id="player-repeat-btn" onclick="toggleRepeat()" title="تكرار السورة">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
                
                <button class="player-btn" onclick="playPrevious()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg></button>
                <button class="player-btn play-toggle-btn" id="player-play-btn" onclick="togglePlayPause()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                <button class="player-btn" onclick="playNext()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg></button>
                
                <!-- خيار التشغيل التلقائي المتتالي -->
                <button class="player-btn opt-btn active" id="player-autoplay-btn" onclick="toggleAutoplay()" title="التشغيل التلقائي">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 17l5-5-5-5M6 17l5-5-5-5"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Download Overlay -->
    <div class="download-overlay" id="download-overlay">
        <div class="download-card">
            <div class="download-title" id="dl-title-text">جاري التحميل...</div>
            <div class="download-surah-name" id="dl-surah-name"></div>
            <div class="download-progress-container">
                <div class="download-progress-fill" id="dl-progress-fill"></div>
            </div>
            <div class="download-percent" id="dl-percent">0%</div>
        </div>
    </div>

    <script>
        // قائمة القراء المتاحة وعناوين الصور الشخصية مرتبة
        const recitersList = [
            { id: "husary", nameAr: "الشيخ محمود خليل الحصري", nameEn: "Sheikh Mahmoud Khalil Al-Husary", image: "https://h.top4top.io/p_3812jamsy0.jpg", initial: "ح", titleAr: "محمود خليل <strong>الحصري</strong>", titleEn: "Mahmoud Khalil <strong>Al-Husary</strong>" },

            { id: "mustafa", nameAr: "الشيخ مصطفى إسماعيل", nameEn: "Sheikh Mustafa Ismail", image: "https://i.top4top.io/p_3812x41cu1.jpg", initial: "ص", titleAr: "مصطفى <strong>إسماعيل</strong>", titleEn: "Mustafa <strong>Ismail</strong>" },

        // App States
        let currentLang = 'ar';

        // Theme Switch

        // Render Sheikh Horizontal Selectors
        function renderSheikhCarousel() {
            const carousel = document.getElementById('sheikh-carousel');
            carousel.innerHTML = '';
            
            recitersList.forEach(s => {
                const name = currentLang === 'ar' ? s.nameAr : s.nameEn;
                const isActive = (s.id === currentSheikhId);
                const isPlaying = (s.id === playingSheikhId && !audioInstance.paused);
                
                // إضافة شعار تفاعلي للموجات الصوتية المتحركة عند تشغيل القارئ النشط بالخلفية

                        <div class="equalizer-bar bar2"></div>

                item.className = `sheikh-item ${isActive ? 'active' : ''}`;

                        <img src="${s.image}" class="sheikh-avatar-img" id="img-${s.id}" onerror="handleImageError(this, '${s.initial}')" style="${isActive ? 'border-color: var(--accent-gold);' : ''}">

        // جلب ملف الـ JSON الخاص بالختمة وقراءة السور والروابط مباشرة
        async function loadEditionData(sheikhId, editionNum) {
            const config = editionsConfig[sheikhId][editionNum];
            if (!config) return;
            try {
                const response = await fetch(config.file);
                if (!response.ok) throw new Error("JSON file could not be loaded");
                activeSurahsData = await response.json();
            } catch (error) {
                console.error("Error loading JSON content. Setting fallback mock data...", error);
                activeSurahsData = [
                    { id: 1, name: "الفاتحة", url: "https://files.catbox.moe/aahpb7.m4a" }
                ];
            }
        }

        // اختيار القارئ وتحديث البيانات
        async function selectSheikh(id) {
            currentSheikhId = id;
            const keys = Object.keys(editionsConfig[currentSheikhId]);
            
            // ميزة الفتح التلقائي على نفس الختمة التي يتم قراءتها حالياً عند العودة للقارئ النشط
            if (id === playingSheikhId && playingEditionId !== null) {
                currentEdition = playingEditionId;
            } else {
                currentEdition = parseInt(keys[0]);
            }
            
            await loadEditionData(currentSheikhId, currentEdition);
            renderSheikhCarousel();
            updateUI();
        }

        // تغيير الختمة النشطة وجلب ملف الـ JSON الجديد فوراً
        async function switchEdition(num) {
            currentEdition = num;
            await loadEditionData(currentSheikhId, currentEdition);
            updateUI();
        }

        // رسم كبسولات التبويب الأفقية الفخمة والمرنة
        function renderEditionSelector() {
            const container = document.getElementById('pills-container');
            container.innerHTML = '';
            
            const config = editionsConfig[currentSheikhId];
            if (!config) return;
            const keys = Object.keys(config);

            // إذا كان القارئ لا يملك سوى طبعة واحدة فقط، يختفي شريط الكبسولات بالكامل لتوفير المساحة
            if (keys.length <= 1) {
                container.style.display = 'none';
                const soleEd = config[keys[0]];
                document.getElementById('header-subtitle').innerText = currentLang === 'ar' ? soleEd.descAr : soleEd.descEn;
                return;
            }

            container.style.display = 'flex';

            keys.forEach(key => {
                const num = parseInt(key);
                const ed = config[num];
                const isActive = (currentEdition === num);
                
                // التحقق مما إذا كانت هذه الكبسولة/الطبعة هي التي تعمل بالخلفية حالياً
                const isPlayingEdition = (playingSheikhId === currentSheikhId && num === playingEditionId && !audioInstance.paused);

                const pill = document.createElement('div');
                pill.className = `pill-item ${isActive ? 'active' : ''}`;
                pill.onclick = () => switchEdition(num);
                
                const pillLabel = currentLang === 'ar' ? ed.pillAr : ed.pillEn;
                const playingIndicator = isPlayingEdition ? `<span class="pill-playing-dot"></span>` : '';

                pill.innerHTML = `
                    ${playingIndicator}
                    <span>${pillLabel}</span>
                `;
                
                container.appendChild(pill);
            });

            // تحديث السطر الوصفي أسفل الاسم بالرواية النشطة حالياً
            const activeEd = config[currentEdition];
            if (activeEd) {
                document.getElementById('header-subtitle').innerText = currentLang === 'ar' ? activeEd.descAr : activeEd.descEn;
            }
        }

        // تحديث معلومات الواجهة والترجمات
        function updateUI() {
            const t = i18n[currentLang];
            const reciter = recitersList.find(r => r.id === currentSheikhId);
            if (!reciter) return;

            renderEditionSelector();

            const ed = editionsConfig[currentSheikhId][currentEdition];

            // تحديث معلومات رأس الصفحة
            const headerImg = document.getElementById('header-avatar-img');

            headerFallback.style.display = 'none';

            headerImg.alt = currentLang === 'ar' ? reciter.nameAr : reciter.nameEn;

            document.getElementById('player-autoplay-btn').title = t.autoplayTooltip;

                document.getElementById('player-track-title').innerText = t.choose;

        // رسم قائمة السور والروابط القادمة من ملف الـ JSON
        function renderSurahsList() {
            const list = document.getElementById('main-surah-list');
            list.innerHTML = '';
            const t = i18n[currentLang];

            activeSurahsData.forEach(s => {
                const name = s.name;
                const isPlaying = (playingSurahId === s.id && playingSheikhId === currentSheikhId && playingEditionId === currentEdition);
                const isPaused = audioInstance.paused;

                const row = document.createElement('div');
                row.className = `surah-row ${isPlaying ? 'active-row' : ''}`;
                row.innerHTML = `
                    <div class="surah-info">
                        <span class="surah-number">${String(s.id).padStart(3, '0')}</span>
                        <span class="surah-name">${t.surah}${name}</span>
                    </div>
                    <div class="actions">
                        <button class="icon-btn ${isPlaying ? 'playing-icon' : ''}" onclick="playSurah(${s.id}, '${s.url}', '${name.replace(/'/g, "\\'")}')">
                            ${isPlaying && !isPaused ? 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'}
                        </button>
                        <button class="icon-btn" onclick="event.stopPropagation(); downloadFile('${s.url}', '${name.replace(/'/g, "\\'")}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        // تشغيل التلاوة المحددة
        function playSurah(id, url, name) {
            const reciter = recitersList.find(r => r.id === currentSheikhId);
            
            if (playingSurahId === id && playingSheikhId === currentSheikhId && playingEditionId === currentEdition) {
                togglePlayPause();
                return;
            }
            
            playingSurahId = id;
            playingSheikhId = currentSheikhId;
            playingEditionId = currentEdition;
            
            audioInstance.pause();
            audioInstance.src = url;
            audioInstance.load(); 
            audioInstance.play().catch(e => console.log("Playback Blocked:", e));
            
            document.getElementById('global-player').classList.add('active');
            document.getElementById('player-track-title').innerText = i18n[currentLang].surah + name;
            
            // التكامل مع إشعارات شاشة القفل والـ Bluetooth للهواتف الذكية
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: i18n[currentLang].surah + name,
                    artist: currentLang === 'ar' ? reciter.nameAr : reciter.nameEn,
                    album: currentLang === 'ar' ? editionsConfig[currentSheikhId][currentEdition].nameAr : editionsConfig[currentSheikhId][currentEdition].nameEn,
                    artwork: [{ src: reciter.image, sizes: '512x512', type: 'image/jpeg' }]
                });

                navigator.mediaSession.setActionHandler('play', () => { togglePlayPause(); });
                navigator.mediaSession.setActionHandler('pause', () => { togglePlayPause(); });
                navigator.mediaSession.setActionHandler('previoustrack', () => { playPrevious(); });
                navigator.mediaSession.setActionHandler('nexttrack', () => { playNext(); });
            }

            updatePlayBtn(true);
            renderSheikhCarousel();
            renderEditionSelector();
            renderSurahsList();
        }

        function togglePlayPause() {
            if (audioInstance.paused) {
                audioInstance.play();
                updatePlayBtn(true);
            } else {
                audioInstance.pause();
                updatePlayBtn(false);
            }
            renderSheikhCarousel();
            renderEditionSelector();
            renderSurahsList();
        }

        function updatePlayBtn(playing) {
            const btn = document.getElementById('player-play-btn');
            btn.innerHTML = playing ? 
                '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : 
                '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
        }

        // الانتقال التلقائي بين سور الـ JSON بالتتابع
        async function playNext() {
            if (playingSurahId === null) return;
            
            // جلب ملف الـ JSON الخاص بالقارئ الذي كان قيد التشغيل إذا اختلف عن المعروض حالياً
            let surahsToNavigate = activeSurahsData;
            if (playingSheikhId !== currentSheikhId || playingEditionId !== currentEdition) {
                try {
                    const response = await fetch(editionsConfig[playingSheikhId][playingEditionId].file);
                    surahsToNavigate = await response.json();
                } catch(e) {
                    console.error("Error navigating sequential play across JSON profiles:", e);
                }
            }

            const currentIdx = surahsToNavigate.findIndex(s => s.id === playingSurahId);
            let nextSurahObj = null;
            
            if (currentIdx !== -1 && currentIdx < surahsToNavigate.length - 1) {
                nextSurahObj = surahsToNavigate[currentIdx + 1];
            } else if (surahsToNavigate.length > 0) {
                nextSurahObj = surahsToNavigate[0]; // العودة للبداية
            }

            if (nextSurahObj) {
                playingSurahId = nextSurahObj.id;
                playSurah(playingSurahId, nextSurahObj.url, nextSurahObj.name);
            }
        }

        async function playPrevious() {
            if (playingSurahId === null) return;

            let surahsToNavigate = activeSurahsData;
            if (playingSheikhId !== currentSheikhId || playingEditionId !== currentEdition) {
                try {
                    const response = await fetch(editionsConfig[playingSheikhId][playingEditionId].file);
                    surahsToNavigate = await response.json();
                } catch(e) {
                    console.error("Error navigating sequential play across JSON profiles:", e);
                }
            }

            const currentIdx = surahsToNavigate.findIndex(s => s.id === playingSurahId);
            let prevSurahObj = null;

            if (currentIdx > 0) {
                prevSurahObj = surahsToNavigate[currentIdx - 1];
            } else if (surahsToNavigate.length > 0) {
                prevSurahObj = surahsToNavigate[surahsToNavigate.length - 1]; // العودة للنهاية
            }

            if (prevSurahObj) {
                playingSurahId = prevSurahObj.id;
                playSurah(playingSurahId, prevSurahObj.url, prevSurahObj.name);
            }
        }

        // خيارات التكرار والتنقل التلقائي
        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('player-repeat-btn').classList.toggle('active', isRepeat);
            showToast(isRepeat ? i18n[currentLang].repeatOn : i18n[currentLang].repeatOff);
        }

        // التشغيل التلقائي المتتالي
        function toggleAutoplay() {
            isAutoplay = !isAutoplay;
            document.getElementById('player-autoplay-btn').classList.toggle('active', isAutoplay);
            showToast(isAutoplay ? i18n[currentLang].autoplayOn : i18n[currentLang].autoplayOff);
        }

        // شريط التمرير والتقدم الزمني للمقطع الصوتي
        const progressContainer = document.getElementById('progress-container');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const currTimeEl = document.getElementById('curr-time');
        const totalTimeEl = document.getElementById('total-time');

        audioInstance.ontimeupdate = () => {
            if (audioInstance.duration) {
                const percent = (audioInstance.currentTime / audioInstance.duration) * 100;
                progressBarFill.style.width = percent + '%';
                currTimeEl.innerText = formatTime(audioInstance.currentTime);
                totalTimeEl.innerText = formatTime(audioInstance.duration);
            }
        };

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }

        let isDragging = false;
        progressContainer.onmousedown = (e) => { isDragging = true; handleSeek(e); };
        window.onmousemove = (e) => { if (isDragging) handleSeek(e); };
        window.onmouseup = () => { isDragging = false; };
        progressContainer.ontouchstart = (e) => { isDragging = true; handleSeek(e.touches[0]); };
        window.ontouchmove = (e) => { if (isDragging) handleSeek(e.touches[0]); };
        window.ontouchend = () => { isDragging = false; };

        // تتبع تصفح شريط التقدم الزمني
        function handleSeek(e) {
            const rect = progressContainer.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            progressBarFill.style.width = (percent * 100) + '%';
            if (!isDragging) {
                audioInstance.currentTime = percent * audioInstance.duration;
            } else {
                currTimeEl.innerText = formatTime(percent * audioInstance.duration);
            }
        }
        
        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioInstance.currentTime = percent * audioInstance.duration;
        };

        // ربط أحداث المشغل تلقائياً لتحديث الأزرار والعلامات النابضة بالواجهة بشكل تفاعلي
        audioInstance.onplay = () => {
            updatePlayBtn(true);
            renderSheikhCarousel();
            renderEditionSelector();
            renderSurahsList();
        };

        audioInstance.onpause = () => {
            updatePlayBtn(false);
            renderSheikhCarousel();
            renderEditionSelector();
            renderSurahsList();
        };

        // الانتقال للمقطع التالي عند انتهاء المقطع الحالي
        audioInstance.onended = () => { 
            if (isRepeat) {
                audioInstance.currentTime = 0;
                audioInstance.play().catch(e => console.log(e));
            } else if (isAutoplay) {
                playNext(); 
            } else {
                updatePlayBtn(false);
                renderSheikhCarousel();
                renderEditionSelector();
                renderSurahsList();
            }
        };

        // تحميل الملفات مع إظهار النسبة المئوية المباشرة لتقدم التحميل
        async function downloadFile(url, filename) {
            const overlay = document.getElementById('download-overlay');
            const fill = document.getElementById('dl-progress-fill');
            const percentText = document.getElementById('dl-percent');
            const surahNameText = document.getElementById('dl-surah-name');
            const titleText = document.getElementById('dl-title-text');
            const t = i18n[currentLang];

            titleText.innerText = t.dl_start;
            surahNameText.innerText = t.surah + filename;
            fill.style.width = '0%';
            percentText.innerText = '0%';

            overlay.classList.add('active');

            await new Promise(resolve => requestAnimationFrame(() => setTimeout(resolve, 50)));

            try {
                const response = await fetch(url);
                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    const percent = Math.round((receivedLength / contentLength) * 100);
                    fill.style.width = percent + '%';
                    percentText.innerText = percent + '%';
                }

                const blob = new Blob(chunks);
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${filename}.mp3`;
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                
                titleText.innerText = t.dl_done;
                setTimeout(() => { overlay.classList.remove('active'); }, 1200);
            } catch (error) {
                console.error("Download Error:", error);
                overlay.classList.remove('active');
                showToast("Download Failed");
            }
        }

        // إشعار الإجراء السريع بأسفل الشاشة
        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2200);
        }

        // الإقلاع الأولي للبرنامج
        (async function() {
            updateThemeIcon();
            await selectSheikh("husary");
        })();
    </script>
</body>
