<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Egy Quran - استمع وحمل القرآن الكريم بأصوات كبار القراء</title>
    <meta name="description" content="منصة Egy Quran تتيح لك الاستماع وتحميل القرآن الكريم بجودة عالية وبأصوات كبار القراء مثل الحصري، المنشاوي، عبد الباسط، مع دعم التشغيل التلقائي والتكرار.">
    <meta name="keywords" content="قرآن كريم, استماع القرآن, تحميل القرآن, مصحف كبار القراء, الحصري, المنشاوي, عبد الباسط عبد الصمد, mp3 قرآن, Egy Quran">
    <meta http-equiv="content-language" content="ar">

    <link rel="canonical" href="https://egyquran.com/">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://egyquran.com/">
    <meta property="og:title" content="Egy Quran - القرآن الكريم بأصوات كبار القراء">
    <meta property="og:description" content="استمع وحمل سور القرآن الكريم بجودة عالية وتجربة استخدام سلسة بدون إعلانات مزعجة.">
    <meta property="og:image" content="https://egyquran.com/icon.png">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Egy Quran - القرآن الكريم بأصوات كبار القراء">
    <meta name="twitter:description" content="استمع وحمل سور القرآن الكريم بجودة عالية وتجربة استخدام سلسة.">
    <meta name="twitter:image" content="https://egyquran.com/icon.png">

    <!-- البيانات المهيكلة -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Egy Quran",
      "url": "https://egyquran.com/",
      "description": "تطبيق ويب مجاني للاستماع وتحميل القرآن الكريم بأصوات كبار القراء بوضوح وعالية الجودة.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "All",
      "inLanguage": "ar",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c5a059">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Egy Quran">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G8Q3DV5BJF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G8Q3DV5BJF');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- رسالة تثبيت التطبيق الانزلاقية -->
    <div id="install-banner" class="install-banner" role="banner" aria-label="تثبيت التطبيق">
        <img src="icon.png" alt="أيقونة Egy Quran" class="install-icon" loading="lazy">
        <div class="install-info">
            <div class="install-title" id="install-title">تثبيت تطبيق Egy Quran</div>
            <div class="install-desc" id="install-desc">تجربة استماع أسرع وتعمل بدون إنترنت</div>
        </div>
        <button class="install-action-btn" id="install-action-btn" aria-label="تثبيت التطبيق">تثبيت</button>
        <button class="install-close-btn" onclick="closeInstallBanner()" aria-label="إغلاق">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- رسالة استئناف الاستماع -->
    <div id="resume-banner" role="dialog" aria-modal="true" aria-labelledby="resume-text">
        <div class="resume-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0z"/>
                <path d="M10 8l6 4-6 4V8z"/>
            </svg>
        </div>
        <div class="resume-text" id="resume-text">هل تود إكمال الاستماع؟</div>
        <div class="resume-actions">
            <button class="resume-btn" id="resume-btn-yes" onclick="resumePlayback()">متابعة الاستماع</button>
            <button class="resume-close" id="resume-btn-no" onclick="closeResumeBanner()">إلغاء</button>
        </div>
    </div>

    <!-- رسالة التوست -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- محتوى الصفحة الرئيسي -->
    <div class="container" id="main-container">

        <!-- الشريط العلوي -->
        <nav class="top-bar" aria-label="أدوات التحكم العامة">
            <div class="top-bar-group">
                <button class="top-btn" onclick="toggleTheme()" id="theme-toggle-btn" aria-label="تبديل المظهر"></button>

                <a href="mailto:contact@egyquran.com" class="top-btn email-btn" aria-label="تواصل معنا عبر البريد الإلكتروني" title="تواصل معنا">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </a>

                <!-- زر إذاعة القرآن الكريم -->
                <div class="radio-wrapper">
                    <button class="top-btn" id="radio-btn" onclick="playRadio()" aria-label="إذاعة القرآن الكريم المباشرة">
                        <span class="radio-badge" id="radio-badge" aria-hidden="true"></span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="2"></circle>
                            <path class="wave-inner" d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49"></path>
                            <path class="wave-outer" d="M19.07 4.93a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"></path>
                        </svg>
                    </button>
                    <div id="radio-tooltip" class="radio-tooltip" aria-hidden="true">إذاعة القرآن الكريم</div>
                </div>
            </div>

            <button class="top-btn lang-btn" onclick="toggleLanguage()" aria-label="تغيير اللغة">
                <span id="lang-label">EN</span>
            </button>
        </nav>

        <!-- رأس الصفحة - صورة القارئ -->
        <header>
            <div class="header-avatar-wrapper">
                <img src="" id="header-avatar-img" class="header-img" alt="صورة القارئ" loading="lazy">
                <div class="header-avatar-glow" aria-hidden="true"></div>
            </div>
            <h1 id="main-title"></h1>
            <p id="header-subtitle" class="header-subtitle"></p>

            <!-- المعادل الصوتي -->
            <div id="header-equalizer" class="header-equalizer" aria-hidden="true">
                <div class="header-eq-bar"></div>
                <div class="header-eq-bar"></div>
                <div class="header-eq-bar"></div>
                <div class="header-eq-bar"></div>
                <div class="header-eq-bar"></div>
            </div>
        </header>

        <!-- قائمة القراء -->
        <section aria-label="اختيار القارئ">
            <div class="sheikh-selector-wrapper">
                <div class="sheikh-list" id="sheikh-carousel" role="list"></div>
            </div>
        </section>

        <!-- الختمات -->
        <section aria-label="اختيار الرواية">
            <div class="edition-dropdown-wrapper" id="edition-dropdown-wrapper"></div>
        </section>

        <!-- قائمة السور -->
        <main role="main">
            <div class="surah-list-container" id="main-surah-list" aria-label="قائمة السور"></div>
        </main>

    </div>

    <!-- نافذة التحميل -->
    <div id="download-modal" class="download-modal" role="dialog" aria-modal="true" aria-labelledby="dl-modal-title">
        <div class="download-modal-content">
            <div class="dl-modal-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </div>
            <div id="dl-modal-title" class="dl-modal-title">جاري التحميل...</div>
            <div class="dl-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <div id="dl-progress-fill" class="dl-progress-fill"></div>
            </div>
            <div id="dl-modal-pct" class="dl-modal-pct">0%</div>
        </div>
    </div>

    <!-- المشغل السفلي -->
    <div class="floating-player" id="global-player" role="region" aria-label="مشغل الصوت">
        <!-- شريط التقدم -->
        <div class="player-seekbar-container" id="progress-container" role="slider" aria-label="موضع التشغيل" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
            <div class="player-seekbar-track">
                <div class="player-seekbar-fill" id="progress-bar-fill">
                    <div class="player-seekbar-thumb" id="progress-thumb"></div>
                </div>
            </div>
        </div>

        <!-- معلومات ومعادل الصوت -->
        <div class="player-info-row">
            <div id="player-track-title" class="player-track-title"></div>
            <div class="player-time">
                <span id="curr-time" dir="ltr">00:00</span>
                <span id="time-separator" class="time-sep">/</span>
                <span id="total-time" dir="ltr">00:00</span>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="player-controls-row">

            <!-- زر وضع الاستماع الهادئ -->
            <div class="player-side-btn">
                <button class="icon-btn" id="focus-toggle-btn" onclick="toggleFocusMode()" aria-label="وضع الاستماع الهادئ" aria-pressed="false">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path>
                    </svg>
                </button>
            </div>

            <!-- أزرار التنقل والتشغيل -->
            <div class="player-main-controls">
                <button class="icon-btn nav-btn" onclick="playPrevious()" aria-label="السورة السابقة">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="play-toggle-btn" id="player-play-btn" onclick="togglePlayPause()" aria-label="تشغيل أو إيقاف مؤقت"></button>
                <button class="icon-btn nav-btn" onclick="playNext()" aria-label="السورة التالية">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <!-- زر وضع التشغيل -->
            <div class="player-side-btn player-side-btn--end" id="playback-wrapper">
                <button class="icon-btn playback-mode-btn active-feature" id="btn-playback-mode" onclick="togglePlaybackMenu(event)" aria-label="وضع التشغيل" aria-haspopup="true" aria-expanded="false">
                    <span id="playback-text">تلقائي</span>
                    <svg id="playback-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"></svg>
                </button>
                <div class="playback-menu" id="playback-menu" role="menu" aria-label="خيارات التشغيل"></div>
            </div>

        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
